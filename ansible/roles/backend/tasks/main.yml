- name: Creer route dashboard
  copy:
    dest: /opt/helpdesk-backend/routes/dashboard.py
    content: |
      from flask import Blueprint, jsonify
      from flask_jwt_extended import jwt_required, get_jwt_identity
      from extensions import db
      from models import Ticket, User, Notification
      from sqlalchemy import func

      dashboard_bp = Blueprint('dashboard', __name__)

      @dashboard_bp.route('/stats', methods=['GET'])
      @jwt_required()
      def get_stats():
          identity = get_jwt_identity()
          stats = {
              'total': Ticket.query.count(),
              'open': Ticket.query.filter_by(status='open').count(),
              'in_progress': Ticket.query.filter_by(status='in_progress').count(),
              'resolved': Ticket.query.filter_by(status='resolved').count(),
              'closed': Ticket.query.filter_by(status='closed').count(),
              'critical': Ticket.query.filter_by(priority='critical').count(),
              'unread_notifications': Notification.query.filter_by(
                  user_id=identity['id'], is_read=False).count()
          }
          by_category = db.session.query(
              Ticket.category_id, func.count(Ticket.id)
          ).group_by(Ticket.category_id).all()
          stats['by_category'] = [{'category_id': r[0], 'count': r[1]} for r in by_category]
          return jsonify(stats)
    owner: helpdesk
    group: helpdesk
    mode: '0644'
  become: yes

# ─── 6. SERVICE SYSTEMD ───────────────────────
- name: Creer le service systemd pour Flask
  copy:
    dest: /etc/systemd/system/helpdesk-backend.service
    content: |
      [Unit]
      Description=HelpDesk Flask Backend
      After=network.target

      [Service]
      User=helpdesk
      WorkingDirectory=/opt/helpdesk-backend
      EnvironmentFile=/opt/helpdesk-backend/.env
      ExecStart=/opt/helpdesk-backend/venv/bin/gunicorn \
          --workers 2 \
          --bind 0.0.0.0:5000 \
          --timeout 120 \
          app:app
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
    owner: root
    group: root
    mode: '0644'
  become: yes
  notify: reload systemd

- name: Activer et demarrer le service backend
  systemd:
    name: helpdesk-backend
    state: started
    enabled: yes
    daemon_reload: yes
  become: yes

- name: Attendre que le backend soit pret
  wait_for:
    port: 5000
    host: 0.0.0.0
    timeout: 30
  become: yes
