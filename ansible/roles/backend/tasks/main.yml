---
# ══════════════════════════════════════════════
# ROLE BACKEND — Deploiement Flask API
# ══════════════════════════════════════════════

# ─── 1. INSTALLATION DEPENDANCES SYSTEME ──────
- name: Installation Python et dependances
  apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - python3-dev
      - libmysqlclient-dev
      - pkg-config
      - gcc
      - git
    state: present
    update_cache: yes
  become: yes

# ─── 2. CREATION DOSSIER APPLICATION ──────────
- name: Creer le dossier de l'application
  file:
    path: /opt/helpdesk-backend
    state: directory
    owner: helpdesk
    group: helpdesk
    mode: '0755'
  become: yes

# ─── 3. CREATION ENVIRONNEMENT VIRTUEL ────────
- name: Creer l'environnement virtuel Python
  command: python3 -m venv /opt/helpdesk-backend/venv
  args:
    creates: /opt/helpdesk-backend/venv
  become: yes
  become_user: helpdesk

# ─── 4. INSTALLATION PACKAGES PYTHON ──────────
- name: Installer les packages Python
  pip:
    name:
      - flask==3.0.0
      - flask-sqlalchemy==3.1.1
      - flask-jwt-extended==4.6.0
      - flask-cors==4.0.0
      - pymysql==1.1.0
      - bcrypt==4.1.2
      - python-dotenv==1.0.0
      - gunicorn==21.2.0
      - marshmallow==3.20.1
    virtualenv: /opt/helpdesk-backend/venv
    state: present
  become: yes
  become_user: helpdesk

# ─── 5. DEPLOIEMENT CODE APPLICATION ──────────
- name: Creer le fichier de configuration
  copy:
    dest: /opt/helpdesk-backend/.env
    content: |
      FLASK_ENV=production
      SECRET_KEY={{ flask_secret_key }}
      JWT_SECRET_KEY={{ jwt_secret_key }}
      DB_HOST={{ db_host }}
      DB_PORT=3306
      DB_NAME={{ mysql_database }}
      DB_USER={{ mysql_user }}
      DB_PASSWORD={{ mysql_password }}
    owner: helpdesk
    group: helpdesk
    mode: '0600'
  become: yes
  no_log: true

- name: Creer le fichier principal de l'application Flask
  copy:
    dest: /opt/helpdesk-backend/app.py
    content: |
      from flask import Flask
      from flask_cors import CORS
      from flask_jwt_extended import JWTManager
      from dotenv import load_dotenv
      from extensions import db
      import os

      load_dotenv()

      def create_app():
          app = Flask(__name__)
          CORS(app, origins="*")

          app.config['SECRET_KEY'] = os.getenv('SECRET_KEY')
          app.config['JWT_SECRET_KEY'] = os.getenv('JWT_SECRET_KEY')
          app.config['SQLALCHEMY_DATABASE_URI'] = (
              f"mysql+pymysql://{os.getenv('DB_USER')}:{os.getenv('DB_PASSWORD')}"
              f"@{os.getenv('DB_HOST')}:{os.getenv('DB_PORT')}/{os.getenv('DB_NAME')}"
          )
          app.config['SQLALCHEMY_TRACK_MODIFICATIONS'] = False
          app.config['JWT_ACCESS_TOKEN_EXPIRES'] = 900
          app.config['JWT_REFRESH_TOKEN_EXPIRES'] = 604800

          db.init_app(app)
          JWTManager(app)

          from routes.auth import auth_bp
          from routes.tickets import tickets_bp
          from routes.users import users_bp
          from routes.categories import categories_bp
          from routes.comments import comments_bp
          from routes.notifications import notifications_bp
          from routes.dashboard import dashboard_bp

          app.register_blueprint(auth_bp, url_prefix='/api/auth')
          app.register_blueprint(tickets_bp, url_prefix='/api/tickets')
          app.register_blueprint(users_bp, url_prefix='/api/users')
          app.register_blueprint(categories_bp, url_prefix='/api/categories')
          app.register_blueprint(comments_bp, url_prefix='/api/comments')
          app.register_blueprint(notifications_bp, url_prefix='/api/notifications')
          app.register_blueprint(dashboard_bp, url_prefix='/api/dashboard')

          return app

      app = create_app()

      if __name__ == '__main__':
          app.run(host='0.0.0.0', port=5000)
    owner: helpdesk
    group: helpdesk
    mode: '0644'
  become: yes

- name: Creer extensions.py
  copy:
    dest: /opt/helpdesk-backend/extensions.py
    content: |
      from flask_sqlalchemy import SQLAlchemy
      db = SQLAlchemy()
    owner: helpdesk
    group: helpdesk
    mode: '0644'
  become: yes

- name: Creer le dossier routes
  file:
    path: /opt/helpdesk-backend/routes
    state: directory
    owner: helpdesk
    group: helpdesk
    mode: '0755'
  become: yes

- name: Creer __init__.py routes
  copy:
    dest: /opt/helpdesk-backend/routes/__init__.py
    content: ''
    owner: helpdesk
    group: helpdesk
    mode: '0644'
  become: yes

- name: Creer models.py
  copy:
    dest: /opt/helpdesk-backend/models.py
    content: |
      from extensions import db
      from datetime import datetime

      class User(db.Model):
          __tablename__ = 'users'
          id = db.Column(db.Integer, primary_key=True)
          name = db.Column(db.String(100), nullable=False)
          email = db.Column(db.String(150), unique=True, nullable=False)
          password_hash = db.Column(db.String(255), nullable=False)
          role = db.Column(db.Enum('admin','tech','user'), default='user')
          is_active = db.Column(db.Boolean, default=True)
          last_login = db.Column(db.DateTime)
          created_at = db.Column(db.DateTime, default=datetime.utcnow)
          updated_at = db.Column(db.DateTime, default=datetime.utcnow, onupdate=datetime.utcnow)

          def to_dict(self):
              return {
                  'id': self.id,
                  'name': self.name,
                  'email': self.email,
                  'role': self.role,
                  'is_active': self.is_active,
                  'last_login': self.last_login.isoformat() if self.last_login else None,
                  'created_at': self.created_at.isoformat()
              }

      class Category(db.Model):
          __tablename__ = 'categories'
          id = db.Column(db.Integer, primary_key=True)
          name = db.Column(db.String(100), nullable=False)
          icon = db.Column(db.String(50))
          color = db.Column(db.String(20))
          created_at = db.Column(db.DateTime, default=datetime.utcnow)

          def to_dict(self):
              return {'id': self.id, 'name': self.name, 'icon': self.icon, 'color': self.color}

      class Ticket(db.Model):
          __tablename__ = 'tickets'
          id = db.Column(db.Integer, primary_key=True)
          title = db.Column(db.String(200), nullable=False)
          description = db.Column(db.Text)
          status = db.Column(db.Enum('open','in_progress','resolved','closed'), default='open')
          priority = db.Column(db.Enum('low','medium','high','critical'), default='medium')
          user_id = db.Column(db.Integer, db.ForeignKey('users.id'))
          category_id = db.Column(db.Integer, db.ForeignKey('categories.id'))
          assigned_to = db.Column(db.Integer, db.ForeignKey('users.id'))
          created_at = db.Column(db.DateTime, default=datetime.utcnow)
          updated_at = db.Column(db.DateTime, default=datetime.utcnow, onupdate=datetime.utcnow)
          resolved_at = db.Column(db.DateTime)

          user = db.relationship('User', foreign_keys=[user_id])
          category = db.relationship('Category')
          assignee = db.relationship('User', foreign_keys=[assigned_to])

          def to_dict(self):
              return {
                  'id': self.id,
                  'title': self.title,
                  'description': self.description,
                  'status': self.status,
                  'priority': self.priority,
                  'user_id': self.user_id,
                  'user': self.user.to_dict() if self.user else None,
                  'category': self.category.to_dict() if self.category else None,
                  'assigned_to': self.assigned_to,
                  'assignee': self.assignee.to_dict() if self.assignee else None,
                  'created_at': self.created_at.isoformat(),
                  'updated_at': self.updated_at.isoformat(),
                  'resolved_at': self.resolved_at.isoformat() if self.resolved_at else None
              }

      class Comment(db.Model):
          __tablename__ = 'comments'
          id = db.Column(db.Integer, primary_key=True)
          ticket_id = db.Column(db.Integer, db.ForeignKey('tickets.id'), nullable=False)
          user_id = db.Column(db.Integer, db.ForeignKey('users.id'))
          message = db.Column(db.Text, nullable=False)
          created_at = db.Column(db.DateTime, default=datetime.utcnow)

          user = db.relationship('User')

          def to_dict(self):
              return {
                  'id': self.id,
                  'ticket_id': self.ticket_id,
                  'user': self.user.to_dict() if self.user else None,
                  'message': self.message,
                  'created_at': self.created_at.isoformat()
              }

      class ActivityLog(db.Model):
          __tablename__ = 'activity_log'
          id = db.Column(db.Integer, primary_key=True)
          ticket_id = db.Column(db.Integer, db.ForeignKey('tickets.id'))
          user_id = db.Column(db.Integer, db.ForeignKey('users.id'))
          action = db.Column(db.String(100))
          old_value = db.Column(db.String(255))
          new_value = db.Column(db.String(255))
          created_at = db.Column(db.DateTime, default=datetime.utcnow)

          def to_dict(self):
              return {
                  'id': self.id,
                  'ticket_id': self.ticket_id,
                  'user_id': self.user_id,
                  'action': self.action,
                  'old_value': self.old_value,
                  'new_value': self.new_value,
                  'created_at': self.created_at.isoformat()
              }

      class Notification(db.Model):
          __tablename__ = 'notifications'
          id = db.Column(db.Integer, primary_key=True)
          user_id = db.Column(db.Integer, db.ForeignKey('users.id'))
          ticket_id = db.Column(db.Integer, db.ForeignKey('tickets.id'))
          message = db.Column(db.Text)
          is_read = db.Column(db.Boolean, default=False)
          created_at = db.Column(db.DateTime, default=datetime.utcnow)

          def to_dict(self):
              return {
                  'id': self.id,
                  'ticket_id': self.ticket_id,
                  'message': self.message,
                  'is_read': self.is_read,
                  'created_at': self.created_at.isoformat()
              }
    owner: helpdesk
    group: helpdesk
    mode: '0644'
  become: yes

- name: Creer route auth
  copy:
    dest: /opt/helpdesk-backend/routes/auth.py
    content: |
      from flask import Blueprint, request, jsonify
      from flask_jwt_extended import create_access_token, create_refresh_token, jwt_required, get_jwt_identity
      from extensions import db
      from models import User
      import bcrypt
      from datetime import datetime

      auth_bp = Blueprint('auth', __name__)

      @auth_bp.route('/register', methods=['POST'])
      def register():
          data = request.get_json()
          if User.query.filter_by(email=data['email']).first():
              return jsonify({'error': 'Email deja utilise'}), 400
          hashed = bcrypt.hashpw(data['password'].encode(), bcrypt.gensalt()).decode()
          user = User(name=data['name'], email=data['email'], password_hash=hashed)
          db.session.add(user)
          db.session.commit()
          return jsonify({'message': 'Compte cree avec succes', 'user': user.to_dict()}), 201

      @auth_bp.route('/login', methods=['POST'])
      def login():
          data = request.get_json()
          user = User.query.filter_by(email=data['email']).first()
          if not user or not bcrypt.checkpw(data['password'].encode(), user.password_hash.encode()):
              return jsonify({'error': 'Identifiants invalides'}), 401
          if not user.is_active:
              return jsonify({'error': 'Compte desactive'}), 403
          user.last_login = datetime.utcnow()
          db.session.commit()
          access_token = create_access_token(identity={'id': user.id, 'role': user.role})
          refresh_token = create_refresh_token(identity={'id': user.id, 'role': user.role})
          return jsonify({
              'access_token': access_token,
              'refresh_token': refresh_token,
              'user': user.to_dict()
          })

      @auth_bp.route('/refresh', methods=['POST'])
      @jwt_required(refresh=True)
      def refresh():
          identity = get_jwt_identity()
          access_token = create_access_token(identity=identity)
          return jsonify({'access_token': access_token})

      @auth_bp.route('/me', methods=['GET'])
      @jwt_required()
      def me():
          identity = get_jwt_identity()
          user = User.query.get(identity['id'])
          return jsonify(user.to_dict())
    owner: helpdesk
    group: helpdesk
    mode: '0644'
  become: yes

- name: Creer route tickets
  copy:
    dest: /opt/helpdesk-backend/routes/tickets.py
    content: |
      from flask import Blueprint, request, jsonify
      from flask_jwt_extended import jwt_required, get_jwt_identity
      from extensions import db
      from models import Ticket, ActivityLog, Notification, User
      from datetime import datetime

      tickets_bp = Blueprint('tickets', __name__)

      @tickets_bp.route('', methods=['GET'])
      @jwt_required()
      def get_tickets():
          identity = get_jwt_identity()
          if identity['role'] in ['admin', 'tech']:
              tickets = Ticket.query.order_by(Ticket.created_at.desc()).all()
          else:
              tickets = Ticket.query.filter_by(user_id=identity['id']).order_by(Ticket.created_at.desc()).all()
          return jsonify([t.to_dict() for t in tickets])

      @tickets_bp.route('', methods=['POST'])
      @jwt_required()
      def create_ticket():
          identity = get_jwt_identity()
          data = request.get_json()
          ticket = Ticket(
              title=data['title'],
              description=data.get('description'),
              priority=data.get('priority', 'medium'),
              category_id=data.get('category_id'),
              user_id=identity['id']
          )
          db.session.add(ticket)
          db.session.flush()
          log = ActivityLog(ticket_id=ticket.id, user_id=identity['id'], action='created', new_value='open')
          db.session.add(log)
          db.session.commit()
          return jsonify(ticket.to_dict()), 201

      @tickets_bp.route('/<int:ticket_id>', methods=['GET'])
      @jwt_required()
      def get_ticket(ticket_id):
          ticket = Ticket.query.get_or_404(ticket_id)
          return jsonify(ticket.to_dict())

      @tickets_bp.route('/<int:ticket_id>', methods=['PATCH'])
      @jwt_required()
      def update_ticket(ticket_id):
          identity = get_jwt_identity()
          ticket = Ticket.query.get_or_404(ticket_id)
          data = request.get_json()
          for field in ['title', 'description', 'priority', 'category_id']:
              if field in data:
                  old_val = str(getattr(ticket, field))
                  setattr(ticket, field, data[field])
                  log = ActivityLog(ticket_id=ticket.id, user_id=identity['id'],
                                    action=f'updated_{field}', old_value=old_val, new_value=str(data[field]))
                  db.session.add(log)
          if 'status' in data:
              old_status = ticket.status
              ticket.status = data['status']
              if data['status'] == 'resolved':
                  ticket.resolved_at = datetime.utcnow()
              log = ActivityLog(ticket_id=ticket.id, user_id=identity['id'],
                                action='status_changed', old_value=old_status, new_value=data['status'])
              db.session.add(log)
              if ticket.user_id:
                  notif = Notification(
                      user_id=ticket.user_id, ticket_id=ticket.id,
                      message=f'Votre ticket #{ticket.id} est maintenant {data["status"]}'
                  )
                  db.session.add(notif)
          if 'assigned_to' in data and identity['role'] in ['admin', 'tech']:
              ticket.assigned_to = data['assigned_to']
          db.session.commit()
          return jsonify(ticket.to_dict())

      @tickets_bp.route('/<int:ticket_id>', methods=['DELETE'])
      @jwt_required()
      def delete_ticket(ticket_id):
          identity = get_jwt_identity()
          if identity['role'] != 'admin':
              return jsonify({'error': 'Non autorise'}), 403
          ticket = Ticket.query.get_or_404(ticket_id)
          db.session.delete(ticket)
          db.session.commit()
          return jsonify({'message': 'Ticket supprime'})
    owner: helpdesk
    group: helpdesk
    mode: '0644'
  become: yes

- name: Creer route users
  copy:
    dest: /opt/helpdesk-backend/routes/users.py
    content: |
      from flask import Blueprint, request, jsonify
      from flask_jwt_extended import jwt_required, get_jwt_identity
      from extensions import db
      from models import User
      import bcrypt

      users_bp = Blueprint('users', __name__)

      @users_bp.route('', methods=['GET'])
      @jwt_required()
      def get_users():
          identity = get_jwt_identity()
          if identity['role'] != 'admin':
              return jsonify({'error': 'Non autorise'}), 403
          users = User.query.all()
          return jsonify([u.to_dict() for u in users])

      @users_bp.route('/<int:user_id>', methods=['PATCH'])
      @jwt_required()
      def update_user(user_id):
          identity = get_jwt_identity()
          if identity['role'] != 'admin' and identity['id'] != user_id:
              return jsonify({'error': 'Non autorise'}), 403
          user = User.query.get_or_404(user_id)
          data = request.get_json()
          if 'name' in data:
              user.name = data['name']
          if 'email' in data:
              user.email = data['email']
          if 'role' in data and identity['role'] == 'admin':
              user.role = data['role']
          if 'is_active' in data and identity['role'] == 'admin':
              user.is_active = data['is_active']
          if 'password' in data:
              user.password_hash = bcrypt.hashpw(data['password'].encode(), bcrypt.gensalt()).decode()
          db.session.commit()
          return jsonify(user.to_dict())
    owner: helpdesk
    group: helpdesk
    mode: '0644'
  become: yes

