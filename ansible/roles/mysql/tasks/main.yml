---
- name: Installation MariaDB et dependances
  apt:
    name:
      - mariadb-server
      - mariadb-client
      - python3-mysqldb
      - python3-pymysql
    state: present
    update_cache: yes
  become: yes

- name: Demarrer et activer MariaDB
  service:
    name: mariadb
    state: started
    enabled: yes
  become: yes

- name: Definir mot de passe root MariaDB
  mysql_user:
    name: root
    password: "{{ mysql_root_password }}"
    login_unix_socket: /var/run/mysqld/mysqld.sock
    state: present
  become: yes
  ignore_errors: yes
  no_log: true

- name: Supprimer utilisateurs anonymes
  mysql_user:
    name: ''
    host_all: yes
    state: absent
    login_user: root
    login_password: "{{ mysql_root_password }}"
  become: yes
  ignore_errors: yes
  no_log: true

- name: Creer la base de donnees helpdesk
  mysql_db:
    name: "{{ mysql_database }}"
    state: present
    encoding: utf8mb4
    collation: utf8mb4_unicode_ci
    login_user: root
    login_password: "{{ mysql_root_password }}"
  become: yes
  ignore_errors: yes
  no_log: true

- name: Creer utilisateur applicatif helpdesk
  mysql_user:
    name: "{{ mysql_user }}"
    password: "{{ mysql_password }}"
    priv: "{{ mysql_database }}.*:ALL"
    host: "10.0.2.%"
    state: present
    login_user: root
    login_password: "{{ mysql_root_password }}"
  become: yes
  ignore_errors: yes
  no_log: true

- name: Creer utilisateur adminer
  mysql_user:
    name: adminer
    password: "{{ mysql_adminer_password }}"
    priv: "{{ mysql_database }}.*:SELECT"
    host: "10.0.2.%"
    state: present
    login_user: root
    login_password: "{{ mysql_root_password }}"
  become: yes
  ignore_errors: yes
  no_log: true

- name: Configurer MariaDB pour ecouter sur toutes les interfaces
  copy:
    dest: /etc/mysql/mariadb.conf.d/99-helpdesk.cnf
    content: |
      [mysqld]
      bind-address = 0.0.0.0
      character-set-server = utf8mb4
      collation-server = utf8mb4_unicode_ci
      max_connections = 100
    owner: root
    group: root
    mode: '0644'
  become: yes

- name: Executer le script SQL d initialisation
  mysql_db:
    name: "{{ mysql_database }}"
    state: import
    target: /tmp/init_helpdesk.sql
    login_user: root
    login_password: "{{ mysql_root_password }}"
  become: yes
  ignore_errors: yes
  no_log: true

- name: Installer Nginx et PHP pour Adminer
  apt:
    name:
      - nginx
      - php-fpm
      - php-mysql
    state: present
  become: yes

- name: Telecharger Adminer
  get_url:
    url: https://github.com/vrana/adminer/releases/download/v4.8.1/adminer-4.8.1.php
    dest: /var/www/html/adminer.php
    mode: '0644'
  become: yes

- name: Configurer Nginx pour Adminer
  copy:
    dest: /etc/nginx/sites-available/adminer
    content: |
      server {
        listen 8080;
        root /var/www/html;
        index adminer.php;
        location / {
          try_files $uri $uri/ =404;
        }
        location ~ \.php$ {
          include snippets/fastcgi-php.conf;
          fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        }
      }
    owner: root
    group: root
    mode: '0644'
  become: yes

- name: Activer le site Adminer
  file:
    src: /etc/nginx/sites-available/adminer
    dest: /etc/nginx/sites-enabled/adminer
    state: link
  become: yes

- name: Demarrer Nginx
  service:
    name: nginx
    state: started
    enabled: yes
  become: yes
