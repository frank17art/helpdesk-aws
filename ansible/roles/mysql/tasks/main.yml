---
- name: Installation MariaDB et dependances
  apt:
    name:
      - mariadb-server
      - mariadb-client
      - python3-mysqldb
      - python3-pymysql
    state: present
    update_cache: yes
  become: yes

- name: Demarrer et activer MariaDB
  service:
    name: mariadb
    state: started
    enabled: yes
  become: yes

- name: Definir mot de passe root MariaDB
  mysql_user:
    name: root
    password: "{{ mysql_root_password }}"
    login_unix_socket: /var/run/mysqld/mysqld.sock
    state: present
  become: yes
  no_log: true

- name: Supprimer utilisateurs anonymes
  mysql_user:
    name: ''
    host_all: yes
    state: absent
    login_user: root
    login_password: "{{ mysql_root_password }}"
  become: yes
  no_log: true

- name: Supprimer base de donnees test
  mysql_db:
    name: test
    state: absent
    login_user: root
    login_password: "{{ mysql_root_password }}"
  become: yes
  no_log: true

- name: Creer la base de donnees helpdesk
  mysql_db:
    name: "{{ mysql_database }}"
    state: present
    encoding: utf8mb4
    collation: utf8mb4_unicode_ci
    login_user: root
    login_password: "{{ mysql_root_password }}"
  become: yes
  no_log: true

- name: Creer utilisateur applicatif helpdesk
  mysql_user:
    name: "{{ mysql_user }}"
    password: "{{ mysql_password }}"
    priv: "{{ mysql_database }}.*:ALL"
    host: "10.0.2.%"
    state: present
    login_user: root
    login_password: "{{ mysql_root_password }}"
  become: yes
  no_log: true

- name: Creer utilisateur adminer
  mysql_user:
    name: adminer
    password: "{{ mysql_adminer_password }}"
    priv: "{{ mysql_database }}.*:SELECT"
    host: "10.0.2.%"
    state: present
    login_user: root
    login_password: "{{ mysql_root_password }}"
  become: yes
  no_log: true

- name: Configurer MariaDB pour ecouter sur toutes les interfaces
  copy:
    dest: /etc/mysql/mariadb.conf.d/99-helpdesk.cnf
    content: |
      [mysqld]
      bind-address = 0.0.0.0
      character-set-server = utf8mb4
      collation-server = utf8mb4_unicode_ci
      max_connections = 100
    owner: root
    group: root
    mode: '0644'
  become: yes
  notify: restart mariadb

- name: Copier le script SQL d'initialisation
  copy:
    dest: /tmp/init_helpdesk.sql
    content: |
      USE helpdesk_db;

      CREATE TABLE IF NOT EXISTS users (
        id INT AUTO_INCREMENT PRIMARY KEY,
        name VARCHAR(100) NOT NULL,
        email VARCHAR(150) UNIQUE NOT NULL,
        password_hash VARCHAR(255) NOT NULL,
        role ENUM('admin','tech','user') DEFAULT 'user',
        is_active BOOLEAN DEFAULT TRUE,
        last_login DATETIME,
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
      );

      CREATE TABLE IF NOT EXISTS categories (
        id INT AUTO_INCREMENT PRIMARY KEY,
        name VARCHAR(100) NOT NULL,
        icon VARCHAR(50),
        color VARCHAR(20),
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP
      );

      CREATE TABLE IF NOT EXISTS tickets (
        id INT AUTO_INCREMENT PRIMARY KEY,
        title VARCHAR(200) NOT NULL,
        description TEXT,
        status ENUM('open','in_progress','resolved','closed') DEFAULT 'open',
        priority ENUM('low','medium','high','critical') DEFAULT 'medium',
        user_id INT,
        category_id INT,
        assigned_to INT,
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        resolved_at DATETIME,
        FOREIGN KEY (user_id) REFERENCES users(id) ON DELETE SET NULL,
        FOREIGN KEY (category_id) REFERENCES categories(id) ON DELETE SET NULL,
        FOREIGN KEY (assigned_to) REFERENCES users(id) ON DELETE SET NULL
      );

      CREATE TABLE IF NOT EXISTS comments (
        id INT AUTO_INCREMENT PRIMARY KEY,
        ticket_id INT NOT NULL,
        user_id INT,
        message TEXT NOT NULL,
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        FOREIGN KEY (ticket_id) REFERENCES tickets(id) ON DELETE CASCADE,
        FOREIGN KEY (user_id) REFERENCES users(id) ON DELETE SET NULL
      );

      CREATE TABLE IF NOT EXISTS activity_log (
        id INT AUTO_INCREMENT PRIMARY KEY,
        ticket_id INT,
        user_id INT,
        action VARCHAR(100),
        old_value VARCHAR(255),
        new_value VARCHAR(255),
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        FOREIGN KEY (ticket_id) REFERENCES tickets(id) ON DELETE CASCADE,
        FOREIGN KEY (user_id) REFERENCES users(id) ON DELETE SET NULL
      );

      CREATE TABLE IF NOT EXISTS notifications (
        id INT AUTO_INCREMENT PRIMARY KEY,
        user_id INT,
        ticket_id INT,
        message TEXT,
        is_read BOOLEAN DEFAULT FALSE,
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        FOREIGN KEY (user_id) REFERENCES users(id) ON DELETE CASCADE,
        FOREIGN KEY (ticket_id) REFERENCES tickets(id) ON DELETE CASCADE
      );

      INSERT IGNORE INTO categories (name, icon, color) VALUES
        ('Reseau', 'wifi', '#3498db'),
        ('Materiel', 'computer', '#e74c3c'),
        ('Logiciel', 'code', '#2ecc71'),
        ('Acces', 'lock', '#f39c12'),
        ('Autre', 'help', '#95a5a6');
    owner: ubuntu
    group: ubuntu
    mode: '0600'
  become: yes

- name: Executer le script SQL
  mysql_db:
    name: "{{ mysql_database }}"
    state: import
    target: /tmp/init_helpdesk.sql
    login_user: root
    login_password: "{{ mysql_root_password }}"
  become: yes
  no_log: true

- name: Installer Nginx et PHP pour Adminer
  apt:
    name:
      - nginx
      - php-fpm
      - php-mysql
    state: present
  become: yes

- name: Telecharger Adminer
  get_url:
    url: https://github.com/vrana/adminer/releases/download/v4.8.1/adminer-4.8.1.php
    dest: /var/www/html/adminer.php
    mode: '0644'
  become: yes

- name: Configurer Nginx pour Adminer
  copy:
    dest: /etc/nginx/sites-available/adminer
    content: |
      server {
        listen 8080;
        root /var/www/html;
        index adminer.php;
        location / {
          try_files $uri $uri/ =404;
        }
        location ~ \.php$ {
          include snippets/fastcgi-php.conf;
          fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        }
      }
    owner: root
    group: root
    mode: '0644'
  become: yes
  notify: restart nginx

- name: Activer le site Adminer
  file:
    src: /etc/nginx/sites-available/adminer
    dest: /etc/nginx/sites-enabled/adminer
    state: link
  become: yes
  notify: restart nginx

- name: Demarrer Nginx
  service:
    name: nginx
    state: started
    enabled: yes
  become: yes
