[defaults]
inventory         = inventory/hosts.ini
remote_user       = ubuntu
private_key_file  = ~/.ssh/aws-helpdesk
host_key_checking = False
stdout_callback   = yaml
deprecation_warnings = False
roles_path        = roles

[ssh_connection]
ssh_args = -o StrictHostKeyChecking=no -o ForwardAgent=yes
pipelining = True
