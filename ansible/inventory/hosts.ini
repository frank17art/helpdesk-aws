# ─────────────────────────────────────────────
# HELPDESK AWS — Inventaire Ansible
# Region : us-east-1 (Virginie du Nord)
# Environnement : production
# ─────────────────────────────────────────────

# ══════════════════════════════════════════════
# GROUPES PAR FONCTION
# ══════════════════════════════════════════════

[bastion]
nginx ansible_host=44.214.2.98

[load_balancers]
nginx ansible_host=44.214.2.98

[frontend_servers]
frontend ansible_host=10.0.2.10 ansible_ssh_common_args='-o ProxyJump=ubuntu@44.214.2.98'

[backend_servers]
backend ansible_host=10.0.2.73 ansible_ssh_common_args='-o ProxyJump=ubuntu@44.214.2.98'

[database_servers]
database ansible_host=10.0.2.60 ansible_ssh_common_args='-o ProxyJump=ubuntu@44.214.2.98'

# ══════════════════════════════════════════════
# GROUPES PAR COUCHE APPLICATIVE (TIER)
# ══════════════════════════════════════════════

[tier_web]
nginx ansible_host=44.214.2.98
frontend ansible_host=10.0.2.10 ansible_ssh_common_args='-o ProxyJump=ubuntu@44.214.2.98'

[tier_app]
backend ansible_host=10.0.2.73 ansible_ssh_common_args='-o ProxyJump=ubuntu@44.214.2.98'

[tier_data]
database ansible_host=10.0.2.60 ansible_ssh_common_args='-o ProxyJump=ubuntu@44.214.2.98'

# ══════════════════════════════════════════════
# GROUPES PAR RÉGION / VILLE
# ══════════════════════════════════════════════

[region_us_east]
nginx      ansible_host=44.214.2.98
frontend   ansible_host=10.0.2.10 ansible_ssh_common_args='-o ProxyJump=ubuntu@44.214.2.98'
backend    ansible_host=10.0.2.73 ansible_ssh_common_args='-o ProxyJump=ubuntu@44.214.2.98'
database   ansible_host=10.0.2.60 ansible_ssh_common_args='-o ProxyJump=ubuntu@44.214.2.98'

[datacenter_virginia]
nginx      ansible_host=44.214.2.98
frontend   ansible_host=10.0.2.10 ansible_ssh_common_args='-o ProxyJump=ubuntu@44.214.2.98'
backend    ansible_host=10.0.2.73 ansible_ssh_common_args='-o ProxyJump=ubuntu@44.214.2.98'
database   ansible_host=10.0.2.60 ansible_ssh_common_args='-o ProxyJump=ubuntu@44.214.2.98'

# ══════════════════════════════════════════════
# GROUPES PAR RÉSEAU (PUBLIC / PRIVÉ)
# ══════════════════════════════════════════════

[subnet_public]
nginx ansible_host=44.214.2.98

[subnet_private]
frontend   ansible_host=10.0.2.10 ansible_ssh_common_args='-o ProxyJump=ubuntu@44.214.2.98'
backend    ansible_host=10.0.2.73 ansible_ssh_common_args='-o ProxyJump=ubuntu@44.214.2.98'
database   ansible_host=10.0.2.60 ansible_ssh_common_args='-o ProxyJump=ubuntu@44.214.2.98'

# ══════════════════════════════════════════════
# GROUPES PAR ENVIRONNEMENT
# ══════════════════════════════════════════════

[env_production]
nginx      ansible_host=44.214.2.98
frontend   ansible_host=10.0.2.10 ansible_ssh_common_args='-o ProxyJump=ubuntu@44.214.2.98'
backend    ansible_host=10.0.2.73 ansible_ssh_common_args='-o ProxyJump=ubuntu@44.214.2.98'
database   ansible_host=10.0.2.60 ansible_ssh_common_args='-o ProxyJump=ubuntu@44.214.2.98'

# ══════════════════════════════════════════════
# GROUPE MAÎTRE — TOUTES LES MACHINES
# ══════════════════════════════════════════════

[all_nodes:children]
bastion
frontend_servers
backend_servers
database_servers

# ══════════════════════════════════════════════
# VARIABLES PAR GROUPE
# ══════════════════════════════════════════════

[all_nodes:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/aws-helpdesk

[database_servers:vars]
mysql_port=3306
mysql_bind_address=10.0.2.60

[backend_servers:vars]
flask_port=5000
flask_env=production

[frontend_servers:vars]
node_env=production
react_port=3000
