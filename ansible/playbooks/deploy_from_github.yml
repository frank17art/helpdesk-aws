---
- name: "PHASE 1 - Configuration de base"
  hosts: all_nodes
  become: yes
  roles:
    - common

- name: "PHASE 2 - Base de donnees"
  hosts: database_servers
  become: yes
  vars_files:
    - ../vault/secrets.yml
  roles:
    - mysql

- name: "PHASE 3 - Backend Flask depuis GitHub"
  hosts: backend_servers
  become: yes
  vars_files:
    - ../vault/secrets.yml
  vars:
    github_repo: "https://github.com/frank17art/helpdesk-aws.git"
    db_host: "10.0.2.50"
  tasks:
    - name: Installer git et dependances Python
      apt:
        name: [git, python3, python3-pip, python3-venv, python3-dev, default-libmysqlclient-dev, pkg-config, gcc]
        state: present
        update_cache: yes

    - name: Cloner le repo depuis GitHub
      git:
        repo: "{{ github_repo }}"
        dest: /tmp/helpdesk-aws
        version: main
        force: yes

    - name: Creer le dossier backend
      file:
        path: /opt/helpdesk-backend
        state: directory
        owner: helpdesk
        group: helpdesk
        mode: '0755'

    - name: Copier le code backend
      copy:
        src: /tmp/helpdesk-aws/app/backend/
        dest: /opt/helpdesk-backend/
        remote_src: yes
        owner: helpdesk
        group: helpdesk

    - name: Creer environnement virtuel Python
      command: python3 -m venv /opt/helpdesk-backend/venv
      become_user: helpdesk
      args:
        creates: /opt/helpdesk-backend/venv/bin/activate

    - name: Installer les packages Python
      pip:
        requirements: /opt/helpdesk-backend/requirements.txt
        virtualenv: /opt/helpdesk-backend/venv
      become_user: helpdesk

    - name: Creer fichier .env depuis Vault
      copy:
        dest: /opt/helpdesk-backend/.env
        content: |
          FLASK_ENV=production
          SECRET_KEY={{ flask_secret_key }}
          JWT_SECRET_KEY={{ jwt_secret_key }}
          DB_HOST={{ db_host }}
          DB_PORT=3306
          DB_NAME={{ mysql_database }}
          DB_USER={{ mysql_user }}
          DB_PASSWORD={{ mysql_password }}
        owner: helpdesk
        group: helpdesk
        mode: '0600'
      no_log: true

    - name: Creer service systemd Gunicorn
      copy:
        dest: /etc/systemd/system/helpdesk-backend.service
        content: |
          [Unit]
          Description=NEXUS HelpDesk Backend API
          After=network.target mariadb.service

          [Service]
          User=helpdesk
          WorkingDirectory=/opt/helpdesk-backend
          EnvironmentFile=/opt/helpdesk-backend/.env
          ExecStart=/opt/helpdesk-backend/venv/bin/gunicorn --workers 2 --bind 0.0.0.0:5000 --timeout 120 app:app
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Demarrer le backend
      systemd:
        name: helpdesk-backend
        state: restarted
        enabled: yes
        daemon_reload: yes

    - name: Statut backend
      debug:
        msg: "Backend Flask deploye depuis GitHub !"

- name: "PHASE 4 - Frontend React depuis GitHub"
  hosts: frontend_servers
  become: yes
  vars:
    github_repo: "https://github.com/frank17art/helpdesk-aws.git"
    nginx_public_ip: "13.219.202.209"
  tasks:
    - name: Installer git
      apt:
        name: git
        state: present

    - name: Cloner le repo depuis GitHub
      git:
        repo: "{{ github_repo }}"
        dest: /tmp/helpdesk-aws
        version: main
        force: yes

    - name: Creer dossier frontend
      file:
        path: /opt/helpdesk-frontend
        state: directory
        owner: helpdesk
        group: helpdesk
        mode: '0755'

    - name: Copier le code frontend
      copy:
        src: /tmp/helpdesk-aws/app/frontend/
        dest: /opt/helpdesk-frontend/
        remote_src: yes
        owner: helpdesk
        group: helpdesk

    - name: Mettre a jour l IP de l API
      replace:
        path: /opt/helpdesk-frontend/src/api.js
        regexp: "http://[0-9.]+/api"
        replace: "http://{{ nginx_public_ip }}/api"

    - name: Installer dependances npm
      command: npm install
      args:
        chdir: /opt/helpdesk-frontend
      become_user: helpdesk

    - name: Build React production
      command: npm run build
      args:
        chdir: /opt/helpdesk-frontend
      become_user: helpdesk

    - name: Redemarrer Nginx frontend
      service:
        name: nginx
        state: restarted
        enabled: yes

    - name: Statut frontend
      debug:
        msg: "Frontend React deploye depuis GitHub !"

- name: "PHASE 5 - Nginx Load Balancer"
  hosts: bastion
  become: yes
  vars:
    backend_ip: "10.0.2.4"
    frontend_ip: "10.0.2.171"
    nginx_public_ip: "13.219.202.209"
  tasks:
    - name: Redemarrer Nginx bastion
      service:
        name: nginx
        state: restarted
        enabled: yes

    - name: "DEPLOIEMENT GITHUB TERMINE !"
      debug:
        msg: "NEXUS IT Service Desk disponible sur http://{{ nginx_public_ip }}"
